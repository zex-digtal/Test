<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>Zex Media</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0a'/%3E%3Ctext x='50%25' y='54%25' font-family='Bebas Neue,Arial' font-size='22' fill='%234f8ef7' text-anchor='middle' dominant-baseline='middle'%3EZ%3C/text%3E%3C/svg%3E" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

<style>
/* =================== ZEX MEDIA STYLES =================== */
:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --bg-input: #222222;
  --bg-overlay: rgba(10,10,10,0.85);
  --accent-blue: #4f8ef7;
  --accent-blue-dim: rgba(79,142,247,0.15);
  --accent-red: #ff3b30;
  --accent-gold: #f0a500;
  --accent-purple: #b14ef7;
  --text-primary: #ffffff;
  --text-secondary: #aaaaaa;
  --text-muted: #666666;
  --border: #2a2a2a;
  --online-green: #30d158;
  --shadow-glow: 0 0 20px rgba(79,142,247,0.3);
  --shadow-red-glow: 0 0 15px rgba(255,59,48,0.4);
}
[data-theme="light"] {
  --bg-primary: #f5f5f5;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-input: #f0f0f0;
  --bg-overlay: rgba(245,245,245,0.85);
  --text-primary: #0a0a0a;
  --text-secondary: #555555;
  --text-muted: #888888;
  --border: #e0e0e0;
  --shadow-glow: 0 0 20px rgba(79,142,247,0.25);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
  transition: background 0.4s ease, color 0.4s ease;
}
body { overflow: hidden; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; outline: none; border: none; background: none; color: inherit; }
a { color: var(--accent-blue); text-decoration: none; }
img { display: block; max-width: 100%; }

/* App container */
#app {
  position: relative;
  max-width: 480px;
  height: 100vh;
  height: 100dvh;
  margin: 0 auto;
  background: var(--bg-primary);
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,0,0,0.5);
}
.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  animation: fadeIn 0.3s ease;
  overflow: hidden;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: none; } }
@keyframes slideLeft { from { transform: translateX(-100%); } to { transform: none; } }
@keyframes pop { 0% { transform: scale(1); } 40% { transform: scale(1.35); } 100% { transform: scale(1); } }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .75; transform: scale(1.06); } }
@keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 rgba(255,59,48,0.4); } 50% { box-shadow: 0 0 12px rgba(255,59,48,0.8); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
@keyframes shake { 0%,100% { transform: rotate(0); } 20% { transform: rotate(-15deg); } 40% { transform: rotate(12deg); } 60% { transform: rotate(-8deg); } 80% { transform: rotate(5deg); } }
@keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: .4;} 40% { transform: translateY(-6px); opacity: 1;} }
@keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(79,142,247,0.6); } 50% { text-shadow: 0 0 25px rgba(79,142,247,1), 0 0 35px rgba(79,142,247,0.6); } }

/* Splash */
.splash {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%;
  background: radial-gradient(circle at 50% 40%, #122044 0%, #0a0a0a 70%);
  text-align: center;
  animation: fadeIn 0.6s ease;
}
.splash .logo { font-family: 'Bebas Neue', sans-serif; font-size: 64px; letter-spacing: 4px; }
.splash .logo .zex { color: var(--accent-blue); animation: glow 2s ease-in-out infinite; }
.splash .logo .media { color: var(--text-primary); }
.splash .tagline { margin-top: 12px; color: var(--text-secondary); font-size: 16px; opacity: 0; animation: fadeIn 1s ease 0.4s forwards; }
.splash .credits { position: absolute; bottom: 32px; color: var(--text-muted); font-size: 12px; text-align: center; width: 100%; }

/* Logo small */
.logo-sm { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; display: inline-flex; align-items: center; gap: 2px; }
.logo-sm .zex { color: var(--accent-blue); animation: glow 3s ease-in-out infinite; }
.logo-sm .media { color: var(--text-primary); }

/* Auth */
.auth-page {
  background: linear-gradient(160deg, #0a0a0a 0%, #11203f 100%);
  padding: 24px;
  overflow-y: auto;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.auth-card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
  padding: 28px 22px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}
.auth-tabs {
  display: flex; position: relative;
  background: var(--bg-input);
  border-radius: 30px;
  padding: 4px;
  margin: 18px 0 22px;
}
.auth-tabs button {
  flex: 1; padding: 10px;
  font-weight: 600; color: var(--text-secondary);
  border-radius: 30px;
  z-index: 2; transition: color 0.3s;
}
.auth-tabs button.active { color: #fff; }
.auth-tabs::before {
  content: ""; position: absolute;
  top: 4px; bottom: 4px; left: 4px;
  width: calc(50% - 4px);
  background: linear-gradient(135deg, var(--accent-blue), #2c5fb0);
  border-radius: 30px;
  transition: transform 0.3s ease;
  box-shadow: var(--shadow-glow);
}
.auth-tabs.signup::before { transform: translateX(100%); }

.field {
  position: relative; display: flex; align-items: center;
  background: var(--bg-input);
  border-radius: 12px;
  padding: 0 14px;
  margin-bottom: 12px;
  border: 1px solid transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field:focus-within { border-color: var(--accent-blue); box-shadow: var(--shadow-glow); }
.field svg { color: var(--text-muted); flex-shrink: 0; }
.field input, .field textarea {
  flex: 1; padding: 14px 10px;
  font-size: 15px;
  width: 100%;
}
.field .toggle-eye { color: var(--text-muted); padding: 6px; }
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--accent-blue), #2c5fb0);
  color: #fff; font-weight: 600; font-size: 15px;
  border-radius: 12px;
  margin-top: 6px;
  transition: transform 0.15s, box-shadow 0.2s;
  box-shadow: var(--shadow-glow);
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.98); }
.btn[disabled] { opacity: 0.6; cursor: not-allowed; }
.btn.ghost { background: var(--bg-card); border: 1px solid var(--border); box-shadow: none; }
.btn.danger { background: linear-gradient(135deg, var(--accent-red), #b41e15); box-shadow: var(--shadow-red-glow); }
.btn.gold { background: linear-gradient(135deg, var(--accent-gold), #b07000); box-shadow: 0 0 20px rgba(240,165,0,0.4); }
.btn.purple { background: linear-gradient(135deg, var(--accent-purple), var(--accent-red)); box-shadow: 0 0 20px rgba(177,78,247,0.4); }
.btn.sm { padding: 8px 14px; font-size: 13px; width: auto; }

.link-btn { color: var(--accent-blue); font-size: 13px; padding: 8px 0; text-align: right; display: block; width: 100%; }
.password-strength { height: 4px; background: var(--bg-input); border-radius: 2px; margin: -6px 0 12px; overflow: hidden; }
.password-strength > div { height: 100%; transition: width 0.3s, background 0.3s; }
.auth-foot { text-align: center; margin-top: 18px; color: var(--text-muted); font-size: 12px; }
.auth-foot .heart { color: var(--accent-red); display: inline-block; animation: pulse 1.5s infinite; }

/* Headers */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-header h2 { font-size: 18px; font-weight: 600; }
.icon-btn { padding: 8px; border-radius: 50%; transition: background 0.15s, transform 0.15s; position: relative; display: inline-flex; align-items: center; justify-content: center; }
.icon-btn:active { transform: scale(0.9); background: var(--bg-input); }
.notif-badge {
  position: absolute; top: 2px; right: 2px;
  min-width: 16px; height: 16px;
  padding: 0 4px;
  background: var(--accent-red);
  border-radius: 8px;
  color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-red-glow);
}

/* Main scroll area */
.main-content {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 80px;
  -webkit-overflow-scrolling: touch;
}

/* Bottom nav */
.bottom-nav {
  position: absolute; left: 0; right: 0; bottom: 0;
  display: flex;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  z-index: 50;
}
.bottom-nav button {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  gap: 2px;
  color: var(--text-muted);
  padding: 4px;
  transition: color 0.2s, transform 0.2s;
}
.bottom-nav button.active { color: var(--accent-blue); transform: scale(1.08); filter: drop-shadow(0 0 8px rgba(79,142,247,0.6)); }
.bottom-nav button .label { font-size: 10px; }

/* FAB */
.fab {
  position: absolute; right: 18px; bottom: 90px;
  width: 56px; height: 56px;
  background: linear-gradient(135deg, var(--accent-blue), #2c5fb0);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-glow), 0 6px 20px rgba(0,0,0,0.5);
  z-index: 40;
  transition: transform 0.2s;
}
.fab:active { transform: scale(0.92); }

/* Post card */
.post {
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.post-head {
  display: flex; align-items: center; gap: 10px;
  padding: 12px;
}
.avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: linear-gradient(135deg, #4f8ef7, #b14ef7);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 600;
  flex-shrink: 0;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar.sm { width: 32px; height: 32px; font-size: 12px; }
.avatar.lg { width: 96px; height: 96px; font-size: 32px; }
.post-head .meta { flex: 1; min-width: 0; }
.post-head .name-row { display: flex; align-items: center; gap: 5px; font-weight: 600; font-size: 14px; }
.post-head .username { color: var(--text-muted); font-size: 12px; }
.post-head .time { color: var(--text-muted); font-size: 12px; }
.post .images { position: relative; background: #000; }
.post .images img { width: 100%; max-height: 480px; object-fit: cover; }
.carousel { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
.carousel::-webkit-scrollbar { display: none; }
.carousel > * { flex: 0 0 100%; scroll-snap-align: center; }
.carousel-dots { position: absolute; left: 0; right: 0; bottom: 8px; display: flex; gap: 4px; justify-content: center; }
.carousel-dots span { width: 6px; height: 6px; background: rgba(255,255,255,0.4); border-radius: 50%; }
.carousel-dots span.active { background: #fff; }
.carousel-counter { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: #fff; padding: 2px 8px; border-radius: 12px; font-size: 11px; }
.post-actions { display: flex; align-items: center; gap: 16px; padding: 10px 12px; }
.action-btn { padding: 4px; transition: transform 0.15s; }
.action-btn.liked { color: var(--accent-red); animation: pop 0.4s; }
.post-likes, .post-caption, .post-comments { padding: 0 12px 6px; font-size: 14px; }
.post-likes { font-weight: 600; cursor: pointer; }
.post-caption .uname { font-weight: 600; margin-right: 6px; }
.post-comments { color: var(--text-secondary); font-size: 13px; }
.post-time { padding: 4px 12px 12px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; }

/* Verified badge */
.verified-tick {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  animation: pulseGlow 2.5s ease-in-out infinite;
  border-radius: 50%;
}

/* Skeleton */
.skel { background: linear-gradient(90deg, var(--bg-card) 0%, #2a2a2a 50%, var(--bg-card) 100%); background-size: 800px 100%; animation: shimmer 1.4s linear infinite; border-radius: 8px; }

/* Toasts */
.toast-wrap {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px;
  z-index: 1000;
  width: calc(100% - 32px); max-width: 420px;
  pointer-events: none;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: var(--bg-card);
  border-left: 4px solid var(--accent-blue);
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  font-size: 13px;
  animation: slideDown 0.25s ease;
  pointer-events: auto;
}
.toast.success { border-color: var(--online-green); }
.toast.error { border-color: var(--accent-red); }
.toast.info { border-color: var(--accent-blue); }

/* Modal & overlays */
.modal-back {
  position: absolute; inset: 0;
  background: var(--bg-overlay);
  z-index: 100;
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s;
}
.modal-back.center { align-items: center; }
.modal {
  width: 100%; max-height: 90%;
  background: var(--bg-secondary);
  border-radius: 20px 20px 0 0;
  display: flex; flex-direction: column;
  animation: slideUp 0.3s ease;
  overflow: hidden;
}
.modal-back.center .modal { border-radius: 16px; max-width: 360px; max-height: 80%; animation: fadeIn 0.2s; }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.modal-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; background: var(--bg-secondary); }

/* Drawer */
.drawer-back {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
  animation: fadeIn 0.2s;
}
.drawer {
  position: absolute; top: 0; bottom: 0; left: 0;
  width: 86%; max-width: 360px;
  background: var(--bg-secondary);
  animation: slideLeft 0.3s ease;
  display: flex; flex-direction: column;
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
}

/* Profile */
.profile-head { padding: 20px 16px; }
.profile-stats { display: flex; gap: 18px; justify-content: center; margin: 16px 0; }
.profile-stats .stat { text-align: center; cursor: pointer; flex: 1; }
.profile-stats .stat .num { font-size: 18px; font-weight: 700; }
.profile-stats .stat .label { font-size: 12px; color: var(--text-secondary); }
.profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
.profile-grid > div { aspect-ratio: 1; background: var(--bg-card); position: relative; cursor: pointer; }
.profile-grid img { width: 100%; height: 100%; object-fit: cover; }

/* Chat */
.chat-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.chat-row:active { background: var(--bg-card); }
.chat-row .info { flex: 1; min-width: 0; }
.chat-row .name { display: flex; align-items: center; gap: 4px; font-weight: 600; font-size: 14px; }
.chat-row .last { color: var(--text-secondary); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-row .right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.chat-row .time { color: var(--text-muted); font-size: 11px; }
.chat-row .unread { min-width: 18px; height: 18px; padding: 0 6px; background: var(--accent-blue); border-radius: 9px; color: #fff; font-size: 11px; display: flex; align-items: center; justify-content: center; }
.online-dot { width: 10px; height: 10px; background: var(--online-green); border-radius: 50%; box-shadow: 0 0 0 2px var(--bg-secondary); animation: pulse 2s infinite; }
.online-dot.off { background: var(--text-muted); animation: none; }

.chat-msgs { padding: 14px; display: flex; flex-direction: column; gap: 6px; }
.bubble { max-width: 75%; padding: 9px 12px; border-radius: 16px; font-size: 14px; word-wrap: break-word; animation: fadeIn 0.2s; position: relative; }
.bubble.own { align-self: flex-end; background: linear-gradient(135deg, var(--accent-blue), #2c5fb0); color: #fff; border-bottom-right-radius: 4px; }
.bubble.other { align-self: flex-start; background: var(--bg-card); color: var(--text-primary); border-bottom-left-radius: 4px; }
.bubble .meta { font-size: 10px; opacity: 0.7; margin-top: 4px; display: flex; gap: 4px; align-items: center; justify-content: flex-end; }
.bubble img { border-radius: 12px; margin-top: 4px; max-height: 240px; }
.date-sep { text-align: center; color: var(--text-muted); font-size: 11px; padding: 8px; }
.typing { display: inline-flex; align-items: center; gap: 3px; padding: 8px 12px; background: var(--bg-card); border-radius: 14px; align-self: flex-start; }
.typing span { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }

.chat-input {
  display: flex; align-items: flex-end; gap: 6px;
  padding: 8px 10px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.chat-input textarea {
  flex: 1;
  background: var(--bg-input);
  border-radius: 20px;
  padding: 10px 14px;
  font-size: 14px;
  resize: none;
  max-height: 100px;
  min-height: 40px;
  line-height: 1.4;
}

/* Search */
.search-bar {
  margin: 12px 16px;
  background: var(--bg-input);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  transition: box-shadow 0.2s;
}
.search-bar:focus-within { box-shadow: var(--shadow-glow); }
.search-bar input { flex: 1; font-size: 14px; }
.section-label { padding: 12px 16px 6px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

.user-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  cursor: pointer;
}
.user-row .info { flex: 1; min-width: 0; }
.user-row .name { display: flex; align-items: center; gap: 4px; font-weight: 600; font-size: 14px; }
.user-row .uname { color: var(--text-muted); font-size: 12px; }
.user-row .uid { color: var(--text-muted); font-size: 11px; font-family: monospace; }

/* Notifications */
.notif {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.notif.unread { background: var(--accent-blue-dim); }
.notif .text { flex: 1; font-size: 13px; }
.notif .text b { font-weight: 600; }
.notif .ts { color: var(--text-muted); font-size: 11px; }

/* Verify plans */
.plan-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
  position: relative;
  transition: transform 0.2s, box-shadow 0.3s;
}
.plan-card.popular { border-color: var(--accent-gold); box-shadow: 0 0 30px rgba(240,165,0,0.2); }
.plan-card.elite { border-color: var(--accent-purple); box-shadow: 0 0 30px rgba(177,78,247,0.2); }
.plan-card .badge-pop {
  position: absolute; top: -10px; right: 14px;
  background: linear-gradient(135deg, var(--accent-gold), #b07000);
  color: #fff; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.plan-card h4 { font-size: 16px; margin-bottom: 4px; }
.plan-card .price { font-family: 'Bebas Neue'; font-size: 32px; color: var(--accent-blue); margin: 6px 0; }
.plan-card.popular .price { color: var(--accent-gold); }
.plan-card.elite .price { color: var(--accent-purple); }
.plan-card ul { list-style: none; margin: 10px 0; }

/* Settings list */
.settings-section { padding: 8px 0; border-bottom: 1px solid var(--border); }

.switch::after { content: ""; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: transform 0.3s; }
.switch.on::after { transform: translateX(20px); }

/* Empty states */
.empty {

}

.full-loader { display: flex; align-items: center; justify-content: center; padding: 30px; }

.muted { color: var(--text-muted); }

}

/* ---------- HELPERS ---------- */
const $ = (id) => document.getElementById(id);
const escapeHtml = (s) => (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const timeAgo = (ts) => {
  if (!ts) return '';
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'now';
  if (s < 3600) return Math.floor(s/60) + 'm';
  if (s < 86400) return Math.floor(s/3600) + 'h';
  if (s < 604800) return Math.floor(s/86400) + 'd';
  const d = new Date(ts);
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
};
const formatTime = (ts) => {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
};
const dateLabel = (ts) => {
  const d = new Date(ts), today = new Date();
  if (d.toDateString() === today.toDateString()) return 'Today';
  const y = new Date(); y.setDate(y.getDate()-1);
  if (d.toDateString() === y.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
};

          state.profile = snap.val();
          state.theme = state.profile.theme || 'dark';
          document.documentElement.setAttribute('data-theme', state.theme);
          try {
            const onlineRef = db.ref('online/' + user.uid);
            onlineRef.set(true);
            onlineRef.onDisconnect().set(false);

            db.ref('users/' + user.uid + '/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);
          } catch(e) { console.warn('[Zex] presence setup', e); }
          attachGlobalListeners();
          navigate(state.profile.profileSetup ? 'home' : 'profile-setup');
        } else {
          navigate('profile-setup');
        }
      } else {
        state.user = null;
        state.profile = null;
        cleanupListeners();
        if (state.page !== 'auth') navigate('auth');
      }
    } catch (err) {
      console.error('[Zex] Auth state handler error:', err);
      if (state.page !== 'auth') navigate('auth');

/* ---------- LISTENERS ---------- */
function cleanupListeners() {
  state.unsubs.forEach(fn => { try { fn(); } catch(e){} });
  state.unsubs = [];
}
function attachGlobalListeners() {
  cleanupListeners();
  if (!state.user) return;

  // Notifications counter // 🔥 FIREBASE REALTIME
  const notifRef = db.ref('notifications/' + state.user.uid);
  const notifCb = notifRef.on('value', snap => {
    const items = [];
    snap.forEach(c => items.push({ id: c.key, ...c.val() }));
    items.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    state.notifs = items;
    state.notifsCount = items.filter(n => !n.isRead).length;
    if (state.tab === 'home' || state.modal === 'notifs') renderApp();
  });
  state.unsubs.push(() => notifRef.off('value', notifCb));

  // Following list // 🔥 FIREBASE REALTIME
  const followRef = db.ref('userFollowing/' + state.user.uid);
  const followCb = followRef.on('value', snap => {
    state.followingMap = snap.val() || {};
    if (state.tab === 'home') loadFeed();
  });
  state.unsubs.push(() => followRef.off('value', followCb));

  // Blocks // 🔥 FIREBASE REALTIME
  const blockRef = db.ref('blocks/' + state.user.uid);
  const blockCb = blockRef.on('value', snap => { state.blockedMap = snap.val() || {}; });
  state.unsubs.push(() => blockRef.off('value', blockCb));

  // Chat list // 🔥 FIREBASE REALTIME
  const chatsRef = db.ref('userChats/' + state.user.uid);
  const chatsCb = chatsRef.on('value', async snap => {
    const ids = snap.val() || {};
    const list = [];
    for (const cid of Object.keys(ids)) {
      const cs = await db.ref('chats/' + cid).get();
      if (cs.exists()) list.push({ id: cid, ...cs.val() });
    }
    list.sort((a,b) => (b.lastMessageTime||0) - (a.lastMessageTime||0));
    state.chats = list;
    if (state.tab === 'chats') renderApp();
  });
  state.unsubs.push(() => chatsRef.off('value', chatsCb));
}

/* ---------- FEED ---------- */
async function loadFeed() {
  if (!state.user || !db) return;
  try {
    const ids = Object.keys(state.followingMap || {});
    ids.push(state.user.uid);
    const snap = await db.ref('posts').orderByChild('createdAt').limitToLast(60).get();  // 🔥 FIREBASE REALTIME
    const all = [];
    snap.forEach(c => all.push({ id: c.key, ...c.val() }));
    const filtered = all.filter(p => ids.includes(p.userId) && !state.blockedMap[p.userId]);
    filtered.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    // hydrate authors and likes in parallel
    const userIds = [...new Set(filtered.map(p => p.userId))];
    const authors = {};
    await Promise.all(userIds.map(async uid => {
      const u = await db.ref('users/' + uid).get();
      if (u.exists()) authors[uid] = u.val();
    }));
    await Promise.all(filtered.map(async p => {
      p.author = authors[p.userId];
      const ls = await db.ref('likes/' + p.id).get();  // 🔥 FIREBASE REALTIME
      p.likes = ls.val() || {};
      p.likesCount = Object.keys(p.likes).length;
    }));
    state.feedPosts = filtered;
    if (state.tab === 'home') renderApp();
  } catch (e) { console.warn('[Zex] loadFeed', e); state.feedPosts = []; if (state.tab === 'home') renderApp(); }
}

async function loadMyPosts() {
  if (!state.user || !db) return;
  try {
    const snap = await db.ref('userPosts/' + state.user.uid).get();  // 🔥 FIREBASE REALTIME
    const ids = Object.keys(snap.val() || {});
    const posts = [];
    await Promise.all(ids.map(async id => {
      const ps = await db.ref('posts/' + id).get();
      if (ps.exists()) posts.push({ id, ...ps.val() });
    }));
    posts.sort((a,b) => (b.createdAt||0) - (a.createdAt||0));
    state.uiState.myPosts = posts;
    if (state.tab === 'profile') renderApp();
  } catch (e) { console.warn('[Zex] loadMyPosts', e); }
}

/* ---------- NAV ---------- */
function navigate(page) {
  state.page = page;
  if (['home','search','chats','profile'].includes(page)) state.tab = page;
  if (page === 'home') loadFeed();
  if (page === 'profile') loadMyPosts();
  if (page === 'search') loadSuggested();
  renderApp();
}

/* ---------- RENDER MAIN ---------- */
function renderApp() {
  const app = $('app');
  if (!app) return;
  let html = '';
  if (state.page === 'auth') {
    html = renderAuth();
  } else if (state.page === 'profile-setup') {
    html = renderProfileSetup();
  } else if (['home','search','chats','profile'].includes(state.page)) {
    html = renderMain();
  } else if (state.page === 'chat-box') {
    html = renderChatBox();
  } else if (state.page === 'view-profile') {
    html = renderViewProfile();
  }
  // overlays
  if (state.modal) html += renderModal();
  if (state.drawer) html += renderDrawer();
  app.innerHTML = html;
  attachHandlers();
}

/* ---------- CHAT BOX ---------- */
function renderChatBox() {
  const cid = state.viewChatId;
  const otherUid = state.uiState.chatOther || '';
  const other = state.uiState.chatOtherProfile || {};
  const msgs = state.uiState.messages || [];
  const isTyping = state.uiState.otherTyping;
  const onlineLabel = other._online ? '<span style="color:var(--online-green);">Online</span>' : (other.lastSeen?'Last seen ' + timeAgo(other.lastSeen):'Offline');

  // Group with date separators
  let bubbles = '';
  let lastDate = '';
  for (const m of msgs) {
    const d = dateLabel(m.timestamp);
    if (d !== lastDate) {
      bubbles += `<div class="date-sep">${d}</div>`;
      lastDate = d;
    }
    const own = m.senderId === state.user.uid;
    const ticks = own ? (m.isRead ? '<span style="color:#4f8ef7;">✓✓</span>' : (m.isDelivered ? '✓✓' : '✓')) : '';
    bubbles += `<div class="bubble ${own?'own':'other'}">
      ${m.imageUrl?`<img src="${escapeHtml(m.imageUrl)}" alt=""/>`:''}
      ${m.text?`<div>${escapeHtml(m.text)}</div>`:''}
      <div class="meta">${formatTime(m.timestamp)} ${ticks}</div>
    </div>`;
  }
  if (isTyping) bubbles += `<div class="typing"><span></span><span></span><span></span></div>`;

  return `
    <div class="page">
      <div class="app-header">
        <button class="icon-btn" data-act="back-to-chats">${ICON.back}</button>
        <div style="display:flex;align-items:center;gap:10px;flex:1;cursor:pointer;" data-act="view-user" data-uid="${otherUid}">

          <div>

            <div class="small muted">${onlineLabel}</div>
          </div>
        </div>
        <button class="icon-btn" data-act="chat-menu" data-uid="${otherUid}">${ICON.more}</button>
      </div>
      <div class="main-content chat-msgs" id="chat-scroll" style="padding-bottom:0;">${bubbles}</div>
      <div class="chat-input">
        <button class="icon-btn" data-act="chat-image">${ICON.image}</button>
        <textarea id="msg-input" placeholder="Message..." rows="1" oninput="autoGrow(this); typingTick()"></textarea>
        <button class="icon-btn" data-act="send-msg" style="color:var(--accent-blue);">${ICON.send}</button>
      </div>
    </div>`;
}

/* ===================== EVENT HANDLERS ===================== */
function attachHandlers() {
  // delegate clicks
  $('app').onclick = onClick;

  // attach specific listeners that need 'change' / 'input'
  const psPic = $('ps-pic');
  if (psPic) psPic.onchange = (e) => previewProfilePic(e, 'ps-avatar');
  const epPic = $('ep-pic');
  if (epPic) epPic.onchange = (e) => editProfilePic(e);
  const postFiles = $('post-files');
  if (postFiles) postFiles.onchange = onCreateImagesPicked;

  const searchInput = $('search-input');
  if (searchInput) {
    searchInput.oninput = debounce(onSearchInput, 300);
    if (state.uiState.searchQuery) searchInput.focus();
  } else if (state.tab === 'search') {
    loadSuggested();
  }

  const newChatInput = $('newchat-input');
  if (newChatInput) {
    newChatInput.oninput = debounce(onNewChatSearch, 300);
    setTimeout(() => newChatInput.focus(), 60);
  }

  const msgInput = $('msg-input');
  if (msgInput) {
    msgInput.onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMessage(); }
    };
    setTimeout(() => msgInput.focus(), 80);
  }

  // carousel scroll counters
  document.querySelectorAll('.carousel').forEach(car => {
    car.onscroll = () => {
      const idx = Math.round(car.scrollLeft / car.clientWidth);
      const counter = car.parentElement.querySelector('.cnow');
      if (counter) counter.textContent = idx + 1;
      const dots = car.parentElement.querySelectorAll('.carousel-dots span');
      dots.forEach((d,i) => d.classList.toggle('active', i === idx));
    };
  });

  // chat scroll to bottom
  const cs = $('chat-scroll');
  if (cs) cs.scrollTop = cs.scrollHeight;
  const ss = $('support-scroll');
  if (ss) ss.scrollTop = ss.scrollHeight;
}

function debounce(fn, ms) {
  let t; return function(...args) { clearTimeout(t); t = setTimeout(() => fn.apply(this, args), ms); };
}

function onClick(e) {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;

  if (act === 'auth-tab') { state.uiState.authTab = t.dataset.tab; renderApp(); }
  else if (act === 'toggle-pass') { const inp = $(t.dataset.target); inp.type = inp.type === 'password' ? 'text' : 'password'; t.innerHTML = inp.type === 'password' ? ICON.eye : ICON.eyeOff; }
  else if (act === 'login') doLogin();
  else if (act === 'signup') doSignup();
  else if (act === 'forgot') doForgotPassword();
  else if (act === 'complete-profile') completeProfile();
  else if (act === 'tab') { navigate(t.dataset.tab); }
  else if (act === 'open-create') openModal('create');
  else if (act === 'open-notifs') openModal('notifs');
  else if (act === 'close-modal') closeModal();
  else if (act === 'close-drawer') { state.drawer = false; renderApp(); }
  else if (act === 'open-drawer') { state.drawer = true; renderApp(); }
  else if (act === 'post-publish') publishPost();
  else if (act === 'like') toggleLike(t.dataset.post, t.dataset.author);
  else if (act === 'open-comments') openComments(t.dataset.post, t.dataset.author);
  else if (act === 'send-comment') sendComment(t.dataset.post, t.dataset.author);
  else if (act === 'view-likes') openLikesList(t.dataset.post);
  else if (act === 'share') sharePost(t.dataset.post);
  else if (act === 'view-user') viewUser(t.dataset.uid);
  else if (act === 'back-to-prev') navigate(state.tab);
  else if (act === 'back-to-chats') { state.viewChatId = null; cleanupChatListeners(); navigate('chats'); }
  else if (act === 'follow-toggle') toggleFollow(t.dataset.uid);
  else if (act === 'message-user') startChatWith(t.dataset.uid);
  else if (act === 'open-chat') openChat(t.dataset.chat, t.dataset.uid);
  else if (act === 'send-msg') sendChatMessage();
  else if (act === 'chat-image') triggerChatImagePick();
  else if (act === 'chat-menu') { state.uiState.menuUid = t.dataset.uid; openModal('user-menu'); }
  else if (act === 'block-user') blockUser(t.dataset.uid);
  else if (act === 'unblock-user') unblockUser(t.dataset.uid);
  else if (act === 'unblock') unblockUser(t.dataset.uid);
  else if (act === 'report-user') { toast('Report submitted. Thank you.','success'); closeModal(); }
  else if (act === 'copy-link') { navigator.clipboard.writeText(location.href + '?u=' + t.dataset.uid); toast('Link copied!','success'); closeModal(); }
  else if (act === 'copy-uid') { navigator.clipboard.writeText(t.dataset.id); toast('Copied!','success'); }
  else if (act === 'edit-profile') openModal('edit-profile');
  else if (act === 'save-profile') saveProfileEdits();
  else if (act === 'open-verify') openModal('verify');
  else if (act === 'book-plan') { state.uiState.bookPlan = { name: t.dataset.plan, amount: t.dataset.amount }; openModal('verify-pay'); }
  else if (act === 'confirm-verify-request') submitVerifyRequest();
  else if (act === 'open-support') openSupport();
  else if (act === 'send-support') sendSupport();
  else if (act === 'new-chat') openModal('new-chat');
  else if (act === 'start-chat') startChatWith(t.dataset.uid);
  else if (act === 'view-list') openListModal(t.dataset.list);
  else if (act === 'toggle-private') togglePrivate();
  else if (act === 'change-password') doForgotPassword(state.user?.email);
  else if (act === 'open-change-email') openModal('change-email');
  else if (act === 'confirm-change-email') changeEmail();
  else if (act === 'open-blocked') openBlocked();
  else if (act === 'toggle-theme') toggleTheme();
  else if (act === 'open-switch-account') openModal('switch-account');
  else if (act === 'add-another-account') addAnotherAccount();
  else if (act === 'switch-to-account') switchToAccount(t.dataset.email);
  else if (act === 'logout') doLogout();
  else if (act === 'open-notif') openNotif(t.dataset.uid, t.dataset.post);
  else if (act === 'user-menu') { state.uiState.menuUid = t.dataset.uid; openModal('user-menu'); }
}

  if (commentsUnsub) { try { commentsUnsub(); } catch(e){} commentsUnsub = null; }
  if (supportUnsub) { try { supportUnsub(); } catch(e){} supportUnsub = null; }

async function doLogin() {
  const email = $('li-email').value.trim();

  if (!email || !pass) return toast('Please fill all fields','error');
  try {
    const btn = document.querySelector('[data-act="login"]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Signing in...';
    await auth.signInWithEmailAndPassword(email, pass);
    toast('Welcome back!','success');
  } catch (e) {
    toast(e.message,'error');
    document.querySelector('[data-act="login"]').disabled = false;
    document.querySelector('[data-act="login"]').innerHTML = '<span>Login</span>';
  }
}
async function doSignup() {
  const name = $('su-name').value.trim();
  const username = $('su-uname').value.trim().toLowerCase().replace(/\s+/g,'');
  const email = $('su-email').value.trim();
  const pass = $('su-pass').value;
  const pass2 = $('su-pass2').value;
  if (!name || !username || !email || !pass) return toast('Please fill all fields','error');
  if (pass.length < 6) return toast('Password must be at least 6 chars','error');
  if (pass !== pass2) return toast('Passwords do not match','error');
  if (!/^[a-z0-9_]+$/.test(username)) return toast('Username: lowercase letters, numbers, underscore only','error');
  try {
    const btn = document.querySelector('[data-act="signup"]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account...';
    // username unique?
    const existing = await db.ref('usernames/' + username).get();  // 🔥 FIREBASE REALTIME
    if (existing.exists()) {
      btn.disabled = false; btn.innerHTML = 'Create Account';
      return toast('Username already taken','error');
    }
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    let uniqueId, idTaken = true;
    while (idTaken) {
      uniqueId = generateUniqueId();
      const s = await db.ref('uniqueIds/' + uniqueId).get();
      idTaken = s.exists();
    }
    const profile = {
      uid: cred.user.uid, username, displayName: name, email,
      uniqueId, isVerified: false, accountType: 'public', theme: 'dark',
      followersCount: 0, followingCount: 0, postsCount: 0,
      profileSetup: false,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      lastSeen: firebase.database.ServerValue.TIMESTAMP
    };
    const updates = {};
    updates['users/' + cred.user.uid] = profile;
    updates['usernames/' + username] = cred.user.uid;
    updates['uniqueIds/' + uniqueId] = cred.user.uid;
    await db.ref().update(updates);  // 🔥 FIREBASE REALTIME
    toast('Account created!','success');
  } catch (e) {
    toast(e.message,'error');
    document.querySelector('[data-act="signup"]').disabled = false;
    document.querySelector('[data-act="signup"]').innerHTML = 'Create Account';
  }
}
async function doForgotPassword(prefilled) {
  const email = prefilled || prompt('Enter your account email:');
  if (!email) return;
  try { await auth.sendPasswordResetEmail(email); toast('Reset link sent to ' + email,'success'); }
  catch (e) { toast(e.message,'error'); }
}
async function doLogout() {
  try {
    await db.ref('online/' + state.user.uid).set(false);  // 🔥 FIREBASE REALTIME
    await db.ref('users/' + state.user.uid + '/lastSeen').set(firebase.database.ServerValue.TIMESTAMP);

/* ---------- LIKES ---------- */
async function toggleLike(postId, authorUid) {
  const ref = db.ref('likes/' + postId + '/' + state.user.uid);  // 🔥 FIREBASE REALTIME
  const snap = await ref.get();
  const post = state.feedPosts.find(p => p.id === postId);
  if (snap.exists()) {
    await ref.remove();
    if (post) {
      post.likesCount = Math.max(0, (post.likesCount||1) - 1);
      if (post.likes) delete post.likes[state.user.uid];
    }
    db.ref('posts/' + postId + '/likesCount').transaction(c => Math.max(0, (c||1) - 1));
  } else {
    await ref.set(true);
    if (post) {
      post.likesCount = (post.likesCount||0) + 1;
      post.likes = post.likes || {}; post.likes[state.user.uid] = true;
    }
    db.ref('posts/' + postId + '/likesCount').transaction(c => (c||0) + 1);
    if (authorUid && authorUid !== state.user.uid) {
      const nref = db.ref('notifications/' + authorUid).push();
      await nref.set({
        type:'like', fromUserId: state.user.uid,
        fromUsername: state.profile.username,
        fromAvatar: state.profile.profilePic||null,
        postId, isRead: false,
        createdAt: firebase.database.ServerValue.TIMESTAMP
      });  // 🔥 FIREBASE REALTIME
    }
  }
  renderApp();
}

let commentsUnsub = null;
async function openComments(postId, authorUid) {
  const post = state.feedPosts.find(p => p.id === postId) || { id: postId, userId: authorUid };
  state.uiState.commentsPost = post;
  state.uiState.comments = [];
  openModal('comments');

  const ref = db.ref('comments/' + postId);
  const cb = ref.on('value', async snap => {
    const list = [];
    snap.forEach(c => list.push({ id: c.key, ...c.val() }));
    list.sort((a,b) => (a.createdAt||0) - (b.createdAt||0));
    const userIds = [...new Set(list.map(x => x.userId))];

    await Promise.all(userIds.map(async uid => { const u = await db.ref('users/' + uid).get(); if (u.exists()) authors[uid] = u.val(); }));
    list.forEach(x => x.author = authors[x.userId]);
    state.uiState.comments = list;
    if (state.modal === 'comments') renderApp();
  });
  commentsUnsub = () => ref.off('value', cb);
}

async function loadSuggested() {

  const list = [];
  snap.forEach(c => {
    const u = c.val();
    if (u.uid !== state.user.uid && !state.followingMap[u.uid] && !state.blockedMap[u.uid]) list.push(u);
  });
  state.uiState.suggestedUsers = list.slice(0, 10);

}
async function onSearchInput(e) {
  const q = (e?.target?.value || $('search-input').value).trim().toLowerCase();
  state.uiState.searchQuery = q;
  if (q.length < 2) { state.uiState.searchResults = []; renderApp(); return; }
  const results = [];
  // by uniqueId direct
  if (/^zex\d+$/.test(q)) {
    const idLookup = await db.ref('uniqueIds/' + q).get();  // 🔥 FIREBASE REALTIME
    if (idLookup.exists()) {
      const u = await db.ref('users/' + idLookup.val()).get();
      if (u.exists()) results.push(u.val());
    }
  }
  // by username
  const unameLookup = await db.ref('usernames/' + q).get();
  if (unameLookup.exists()) {
    const u = await db.ref('users/' + unameLookup.val()).get();
    if (u.exists() && !results.find(r=>r.uid===u.val().uid)) results.push(u.val());
  }
  // partial username/displayName scan (limited)
  const all = await db.ref('users').limitToFirst(80).get();
  all.forEach(c => {
    const u = c.val();
    const uname = (u.username||'').toLowerCase();
    const dname = (u.displayName||'').toLowerCase();
    if ((uname.includes(q) || dname.includes(q)) && !results.find(r => r.uid === u.uid)) results.push(u);
  });
  state.uiState.searchResults = results.filter(u => u.uid !== state.user.uid);
  if (state.tab === 'search') {
    // re-render but keep input focus
    const cur = $('search-input');
    const focus = cur && document.activeElement === cur;
    const sel = cur ? cur.selectionStart : 0;
    renderApp();
    if (focus) { const ni = $('search-input'); ni.focus(); ni.setSelectionRange(sel,sel); }
  }
}

  db.ref('users/' + uid + '/followersCount').transaction(c => Math.max(0, (c||0) + (isFollowing?-1:1)));
  db.ref('users/' + state.user.uid + '/followingCount').transaction(c => Math.max(0, (c||0) + (isFollowing?-1:1)));
  if (!isFollowing) {

    await nref.set({
      type:'follow', fromUserId: state.user.uid,

/* ---------- CHAT ---------- */
let chatMsgsUnsub = null, chatTypingUnsub = null, chatOnlineUnsub = null;
function cleanupChatListeners() {
  if (chatMsgsUnsub) { chatMsgsUnsub(); chatMsgsUnsub = null; }
  if (chatTypingUnsub) { chatTypingUnsub(); chatTypingUnsub = null; }
  if (chatOnlineUnsub) { chatOnlineUnsub(); chatOnlineUnsub = null; }
}
async function openChat(chatId, otherUid) {
  cleanupChatListeners();
  if (!chatId) chatId = chatIdFor(state.user.uid, otherUid);
  state.viewChatId = chatId;
  state.uiState.chatOther = otherUid;
  state.uiState.messages = [];
  state.uiState.otherTyping = false;
  state.page = 'chat-box';
  renderApp();

  // ensure chat exists
  const cs = await db.ref('chats/' + chatId).get();
  if (!cs.exists()) {
    const oprof = (await db.ref('users/' + otherUid).get()).val() || {};
    await db.ref('chats/' + chatId).set({
      participants: { [state.user.uid]: true, [otherUid]: true },
      participantInfo: {
        [state.user.uid]: { displayName: state.profile.displayName, username: state.profile.username, profilePic: state.profile.profilePic||null, isVerified: !!state.profile.isVerified },
        [otherUid]: { displayName: oprof.displayName, username: oprof.username, profilePic: oprof.profilePic||null, isVerified: !!oprof.isVerified }
      },
      lastMessage: '', lastMessageTime: firebase.database.ServerValue.TIMESTAMP, lastSenderId: ''
    });  // 🔥 FIREBASE REALTIME
    await db.ref('userChats/' + state.user.uid + '/' + chatId).set(true);
    await db.ref('userChats/' + otherUid + '/' + chatId).set(true);
  }
  // load other profile
  const o = await db.ref('users/' + otherUid).get();
  state.uiState.chatOtherProfile = o.exists() ? o.val() : {};
  // online presence  // 🔥 FIREBASE REALTIME
  const onRef = db.ref('online/' + otherUid);
  const onCb = onRef.on('value', s => {
    state.uiState.chatOtherProfile._online = !!s.val();
    if (state.page === 'chat-box') renderApp();
  });
  chatOnlineUnsub = () => onRef.off('value', onCb);

  // messages listener  // 🔥 FIREBASE REALTIME
  const mref = db.ref('messages/' + chatId);
  const mcb = mref.on('value', snap => {
    const list = [];
    snap.forEach(c => list.push({ id: c.key, ...c.val() }));
    list.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    state.uiState.messages = list;
    // mark incoming as delivered+read
    const updates = {};
    list.forEach(m => {
      if (m.senderId !== state.user.uid && (!m.isDelivered || !m.isRead)) {
        updates['messages/' + chatId + '/' + m.id + '/isDelivered'] = true;
        updates['messages/' + chatId + '/' + m.id + '/isRead'] = true;
      }
    });
    if (Object.keys(updates).length) db.ref().update(updates);  // 🔥 FIREBASE REALTIME
    // reset unread for me
    db.ref('chats/' + chatId + '/unread/' + state.user.uid).set(0);
    if (state.page === 'chat-box') renderApp();
  });
  chatMsgsUnsub = () => mref.off('value', mcb);

  // typing  // 🔥 FIREBASE REALTIME
  const tref = db.ref('typing/' + chatId + '/' + otherUid);
  const tcb = tref.on('value', s => {
    state.uiState.otherTyping = !!s.val();
    if (state.page === 'chat-box') renderApp();
  });
  chatTypingUnsub = () => tref.off('value', tcb);
}

  });

  db.ref('typing/' + cid + '/' + state.user.uid).set(false);
}

      });  // 🔥 FIREBASE REALTIME
      await db.ref('chats/' + cid).update({
        lastMessage: '📷 Photo', lastMessageTime: firebase.database.ServerValue.TIMESTAMP, lastSenderId: state.user.uid
      });
      await db.ref('chats/' + cid + '/unread/' + state.uiState.chatOther).transaction(c => (c||0)+1);
    } catch(e) { toast(e.message,'error'); }
  };
  inp.click();
}

async function startChatWith(uid) {
  const cid = chatIdFor(state.user.uid, uid);
  closeModal();
  await openChat(cid, uid);
}

async function onNewChatSearch(e) {
  const q = (e?.target?.value || $('newchat-input').value).trim().toLowerCase();
  state.uiState.newChatQuery = q;
  if (q.length < 2) { state.uiState.newChatResults = []; renderApp(); return; }
  const results = [];
  const all = await db.ref('users').limitToFirst(80).get();
  all.forEach(c => {
    const u = c.val();
    if (u.uid === state.user.uid) return;
    const uname = (u.username||'').toLowerCase();
    const dname = (u.displayName||'').toLowerCase();
    if (uname.includes(q) || dname.includes(q) || (u.uniqueId||'').toLowerCase().includes(q)) results.push(u);
  });
  state.uiState.newChatResults = results;
  const focus = $('newchat-input') === document.activeElement;
  const sel = focus ? $('newchat-input').selectionStart : 0;
  renderApp();
  if (focus) { const n = $('newchat-input'); n.focus(); n.setSelectionRange(sel,sel); }
}

/* ---------- EDIT PROFILE ---------- */
let editPicFile = null;
function editProfilePic(e) {
  const f = e.target.files[0]; if (!f) return;
  editPicFile = f;
  const r = new FileReader();
  r.onload = ev => {
    const av = document.querySelector('label[for="ep-pic"] .avatar');
    if (av) av.innerHTML = `<img src="${ev.target.result}"/>`;
  };
  r.readAsDataURL(f);
}
async function saveProfileEdits() {
  const dn = $('ep-name').value.trim();
  const un = $('ep-uname').value.trim().toLowerCase().replace(/\s+/g,'');
  const bio = $('ep-bio').value.trim();
  const web = $('ep-web').value.trim();
  if (!dn || !un) return toast('Name and username required','error');
  if (!/^[a-z0-9_]+$/.test(un)) return toast('Invalid username','error');
  try {
    const btn = document.querySelector('[data-act="save-profile"]');
    btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
    if (un !== state.profile.username) {
      const t = await db.ref('usernames/' + un).get();
      if (t.exists()) { btn.disabled = false; btn.innerHTML = 'Save'; return toast('Username taken','error'); }
      await db.ref('usernames/' + state.profile.username).remove();
      await db.ref('usernames/' + un).set(state.user.uid);
    }
    let pic = state.profile.profilePic;
    if (editPicFile) pic = await uploadAvatar(editPicFile);
    const updates = { displayName: dn, username: un, bio, website: web, profilePic: pic };
    await db.ref('users/' + state.user.uid).update(updates);  // 🔥 FIREBASE REALTIME
    state.profile = { ...state.profile, ...updates };
    editPicFile = null;
    toast('Profile saved','success');
    closeModal();
  } catch (e) { toast(e.message,'error'); }
}

/* ---------- USER LISTS ---------- */
async function openListModal(kind) {
  state.uiState.followers = []; state.uiState.following = [];
  if (kind === 'posts') { navigate('profile'); return; }
  openModal('list-' + kind);
  let ids = [];
  if (kind === 'followers') {
    const s = await db.ref('follows/' + state.user.uid).get();
    ids = Object.keys(s.val() || {});
  } else {
    const s = await db.ref('userFollowing/' + state.user.uid).get();
    ids = Object.keys(s.val() || {});
  }
  const list = [];
  await Promise.all(ids.map(async uid => { const u = await db.ref('users/' + uid).get(); if (u.exists()) list.push(u.val()); }));
  state.uiState[kind] = list;
  if (state.modal === 'list-' + kind) renderApp();
}

/* ---------- VERIFY REQUEST ---------- */
async function submitVerifyRequest() {
  const plan = state.uiState.bookPlan;
  if (!plan) return;
  await db.ref('verificationRequests/' + state.user.uid).set({
    plan: plan.name, amount: parseInt(plan.amount), status:'pending',
    requestedAt: firebase.database.ServerValue.TIMESTAMP
  });  // 🔥 FIREBASE REALTIME
  toast('Request submitted! We will verify within 24-48h.','success');
  closeModal();
}

/* ---------- SUPPORT ---------- */
let supportUnsub = null;
async function openSupport() {
  state.uiState.supportMsgs = [];
  openModal('support');
  const ref = db.ref('supportChats/' + state.user.uid);
  const cb = ref.on('value', s => {  // 🔥 FIREBASE REALTIME
    const list = []; s.forEach(c => list.push({ id: c.key, ...c.val() }));
    list.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
    state.uiState.supportMsgs = list;
    if (state.modal === 'support') renderApp();
  });
  supportUnsub = () => ref.off('value', cb);
}
async function sendSupport() {
  const inp = $('support-input'); const text = inp.value.trim(); if (!text) return;
  inp.value = ''; inp.style.height = '40px';
  const ref = db.ref('supportChats/' + state.user.uid).push();
  await ref.set({
    senderId:'user', text, isRead:false,
    timestamp: firebase.database.ServerValue.TIMESTAMP
  });  // 🔥 FIREBASE REALTIME
}

/* ---------- SETTINGS ACTIONS ---------- */
async function togglePrivate() {
  const newType = state.profile.accountType === 'private' ? 'public' : 'private';
  await db.ref('users/' + state.user.uid + '/accountType').set(newType);  // 🔥 FIREBASE REALTIME
  state.profile.accountType = newType;
  toast('Account is now ' + newType, 'success');
  renderApp();
}
async function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', state.theme);
  await db.ref('users/' + state.user.uid + '/theme').set(state.theme);  // 🔥 FIREBASE REALTIME
  state.profile.theme = state.theme;
  renderApp();
}
async function changeEmail() {
  const pass = $('ce-pass').value; const newEmail = $('ce-email').value.trim();
  if (!pass || !newEmail) return toast('Fill all fields','error');
  try {
    const cred = firebase.auth.EmailAuthProvider.credential(state.user.email, pass);
    await state.user.reauthenticateWithCredential(cred);
    await state.user.updateEmail(newEmail);
    await db.ref('users/' + state.user.uid + '/email').set(newEmail);
    toast('Email updated','success'); closeModal();
  } catch(e) { toast(e.message,'error'); }
}
async function openBlocked() {
  state.uiState.blockedUsers = [];
  openModal('blocked');
  const ids = Object.keys(state.blockedMap || {});
  const list = [];
  await Promise.all(ids.map(async uid => { const u = await db.ref('users/' + uid).get(); if (u.exists()) list.push(u.val()); }));
  state.uiState.blockedUsers = list;
  if (state.modal === 'blocked') renderApp();
}
async function blockUser(uid) {
  await db.ref('blocks/' + state.user.uid + '/' + uid).set(true);  // 🔥 FIREBASE REALTIME
  state.blockedMap[uid] = true;
  toast('User blocked','success');
  closeModal();
}
async function unblockUser(uid) {
  await db.ref('blocks/' + state.user.uid + '/' + uid).remove();  // 🔥 FIREBASE REALTIME
  delete state.blockedMap[uid];
  toast('User unblocked','success');
  if (state.modal === 'blocked') openBlocked(); else renderApp();
}

function addAnotherAccount() {
  // store current account
  const acc = { email: state.user.email, displayName: state.profile.displayName, profilePic: state.profile.profilePic, username: state.profile.username };
  if (!state.multiAccounts.find(a => a.email === acc.email)) {
    state.multiAccounts.push(acc);
    localStorage.setItem('zex_accounts', JSON.stringify(state.multiAccounts));
  }
  doLogout();
}
function switchToAccount(email) {
  if (email === state.user.email) { closeModal(); return; }
  const acc = { email: state.user.email, displayName: state.profile.displayName, profilePic: state.profile.profilePic, username: state.profile.username };
  if (!state.multiAccounts.find(a => a.email === acc.email)) {
    state.multiAccounts.push(acc);
    localStorage.setItem('zex_accounts', JSON.stringify(state.multiAccounts));
  }
  toast('Sign in to switch accounts','info');
  doLogout();
}

function openNotif(uid, postId) {
  closeModal();
  if (uid) viewUser(uid);
}

console.log('[Zex] Script fully loaded');
</script>
